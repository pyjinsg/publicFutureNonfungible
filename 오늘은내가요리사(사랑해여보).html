        .input-group label { font-size: 0.9em; font-weight: bold; color: #555; }
        input { padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; width: 220px; }
        button { padding: 15px 40px; background: #2c3e50; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }

        .budget-summary span { color: #1abc9c; font-weight: bold; }
        .over-budget { color: #e74c3c !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        .card { border: 1px solid #eee; border-radius: 20px; padding: 25px; background: #fff; transition: 0.3s; position: relative; }
        .card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .day-label { font-weight: bold; color: #bdc3c7; font-size: 1.1em; margin-bottom: 15px; display: block; }
        
        .meal { margin-bottom: 18px; padding: 15px; border-radius: 12px; background: #fafafa; border-left: 6px solid #dcdde1; }
        .meal.B { border-left-color: #3498db; } 
        .meal.S { border-left-color: #2ecc71; }
        .meal.P { border-left-color: #f1c40f; background: #fffdf0; }
        
        .meal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .meal-name { font-weight: bold; font-size: 1.1em; color: #2c3e50; text-decoration: none; }
        .recipe-links { font-size: 0.75em; display: flex; gap: 5px; margin-top: 4px; }
        .recipe-links a { color: #7f8c8d; text-decoration: none; border: 1px solid #ddd; padding: 2px 5px; border-radius: 4px; }
        .recipe-links a:hover { background: #eee; }
        
        .meal-price { font-size: 0.9em; color: #e74c3c; font-weight: bold; }
        
        .ing-list { margin-top: 12px; border-top: 1px dashed #eee; padding-top: 10px; }
        .ing-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.9em; }
        .shop-links a { font-size: 0.75em; text-decoration: none; margin-left: 8px; font-weight: bold; }

function executeLogistics() {
    const targetBudget = parseInt(document.getElementById('budgetInput').value);
    const peopleCount = parseInt(document.getElementById('peopleInput').value);
    const correctionFactor = peopleCount / 2;
    
    let currentTotal = 0;
    let plan = [];

    for (let day = 1; day <= 30; day++) {
        const remainingDays = 31 - day;
        // 1. 오늘 사용할 수 있는 최대 금전의 한계를 설정
        let dailyLimit = (targetBudget - currentTotal) / remainingDays;

        // 2. [핵심] 가격 필터링이 탑재된 새로운 추출 함수
        const getAffordableMeal = (list, limit) => {
            // 인원 보정가가 적용된 가격이 limit 이하인 것만 선별
            const affordable = list.filter(item => Math.round(item.p * correctionFactor) <= limit);
            
            // 만약 가용 메뉴가 없다면, 리스트에서 가장 저렴한 메뉴를 강제 선택
            let selected;
            if (affordable.length > 0) {
                selected = affordable[Math.floor(Math.random() * affordable.length)];
            } else {
                selected = list.reduce((min, p) => p.p < min.p ? p : min, list[0]);
            }
            return { ...selected, p: Math.round(selected.p * correctionFactor) };
        };

        // 3. 아침/점심/저녁 순차적 예산 집행 (남은 돈은 다음 끼니로 이월)
        // 아침은 일일 예산의 20% 이내에서 권장
        let b = getAffordableMeal(DATA.B, dailyLimit * 0.2); 
        
        // 점심은 (일일예산 - 아침값)의 40% 이내에서 권장
        let s = getAffordableMeal(DATA.S, (dailyLimit - b.p) * 0.5); 
        
        // 저녁은 남은 모든 일일 예산을 쏟아부음
        let p = getAffordableMeal(DATA.P, dailyLimit - (b.p + s.p));

        plan.push({ day, meals: [ {t:'B', d:b, l:'아침'}, {t:'S', d:s, l:'점심'}, {t:'P', d:p, l:'저녁'} ] });
        currentTotal += (b.p + s.p + p.p);
    }

    const summaryDiv = document.getElementById('budgetSummary');
    const isOver = currentTotal > targetBudget;
    summaryDiv.innerHTML = `
        <div class="budget-summary">
            목표 예산: ${targetBudget.toLocaleString()}원 | 
            집행 총액: <span class="${isOver ? 'over-budget' : ''}">${currentTotal.toLocaleString()}원</span> | 
            인원: ${peopleCount}인 (${correctionFactor.toFixed(1)})
        </div>`;

    const display = document.getElementById('display');
    display.innerHTML = "";
    
    plan.forEach(day => {
        const card = document.createElement('div');
        card.className = 'card';
        let html = `<span class="day-label">DAY ${day.day}</span>`;
        
        day.meals.forEach(m => {
            let ingHtml = m.d.i.map(ing => `
                <div class="ing-item">
                    <span>${ing}</span>
                    <div class="shop-links">
                        <a href="https://www.coupang.com/np/search?q=${encodeURIComponent(ing)}" target="_blank" class="cp">쿠팡</a>
                        <a href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent(ing)}" target="_blank" class="nv">네이버</a>
                    </div>
                </div>`).join('');

            html += `
                <div class="meal ${m.t}">
                    <div class="meal-header">
                        <div>
                            <div class="meal-name">${m.d.n}</div>
                            <div class="recipe-links">
                                <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(m.d.n + ' 레시피')}" target="_blank">YouTube</a>
                                <a href="https://www.10000recipe.com/recipe/list.html?q=${encodeURIComponent(m.d.n)}" target="_blank">만개의레시피</a>
                            </div>
                        </div>
                        <span class="meal-price">${m.d.p.toLocaleString()}원</span>
                    </div>
                    <div class="ing-list">${ingHtml}</div>
                </div>`;
        });
        card.innerHTML = html;
        display.appendChild(card);
    });
}
